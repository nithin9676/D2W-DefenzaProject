<!DOCTYPE html>
<html>
<head>
    <title>PPF Roll Inventory</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            margin: 0;
        }

        .header {
            background: white;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            width: 120px;
            text-align: center;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .form {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            margin-right: 10px;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .status-available {
            color: green;
        }

        .status-damaged {
            color: red;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="header">
    PPF Roll Inventory
</div>

<div class="container">

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3 id="total">0</h3>
            <p>Total Rolls</p>
        </div>
        <div class="card">
            <h3 id="available">0</h3>
            <p>Available</p>
        </div>
        <div class="card">
            <h3 id="damaged">0</h3>
            <p>Damaged</p>
        </div>
    </div>

    <!-- Form -->
    <div class="form">
        <input type="text" id="rollId" placeholder="Enter Roll ID">
        <input type="text" id="batch" placeholder="Batch Number">
        <button onclick="addRoll()">Add to Inventory</button>
    </div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>Roll ID</th>
                <th>Batch</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>

const API = "http://localhost:8080";

// Load data
function loadData() {
    fetch(API + "/allroles")
        .then(res => res.json())
        .then(data => {
            let table = "";
            let total = data.length;
            let available = 0;
            let damaged = 0;

            data.forEach(r => {

                if (r.status === "AVAILABLE") available++;
                if (r.status === "DAMAGED") damaged++;

                table += `
                <tr>
                    <td>${r.rollid}</td>
                    <td>${r.batch}</td>
                    <td class="${r.status === 'AVAILABLE' ? 'status-available' : 'status-damaged'}">
                        ${r.status}
                    </td>
                    <td>
                        ${r.status === "AVAILABLE" 
                            ? `<button onclick="damage('${r.rollid}')">Damage</button>` 
                            : `<button onclick="restore('${r.rollid}')">Restore</button>`}
                    </td>
                </tr>
                `;
            });

            document.getElementById("tableBody").innerHTML = table;
            document.getElementById("total").innerText = total;
            document.getElementById("available").innerText = available;
            document.getElementById("damaged").innerText = damaged;
        });
}

// Add Roll
function addRoll() {
    const rollid = document.getElementById("rollId").value;
    const batch = document.getElementById("batch").value;

    fetch(API + "/roleinventory", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            rollid: rollid,
            batch: batch
        })
    }).then(() => {
        loadData();
    });
}

// Damage
function damage(id) {
    fetch(API + "/damagebutton?rollid=" + id, {
        method: "POST"
    }).then(() => loadData());
}

// Restore
function restore(id) {
    fetch(API + "/restorebutton?rollid=" + id, {
        method: "POST"
    }).then(() => loadData());
}

// Initial load
loadData();

</script>

</body>
</html>
