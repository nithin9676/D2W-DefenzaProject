<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Registration</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .msg {
            text-align: center;
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin Register</h2>

    <!-- Show message -->
    <p class="msg" th:text="${message}"></p>

    <form th:action="admindetailsinserting" method="post">
        
        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter Email" required>

        <label>Password:</label>
        <input type="password" name="paswword" placeholder="Enter Password" required>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
